services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: observatory
      POSTGRES_PASSWORD: observatory
      POSTGRES_DB: observatory
    ports:
      # Non-standard host port: local machines often already run Postgres on 5432+
      - "5439:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observatory"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Standalone product API (architecture spec: "API decoupled from indexer") —
  # reads Postgres directly, so it keeps serving while the indexer is down.
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://observatory:observatory@postgres:5432/observatory
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
