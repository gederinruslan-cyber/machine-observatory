packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  # Telemetry-only postinstall pulled in by @nestjs/cli — keep disabled.
  '@scarf/scarf': false
  # facilitators → x402 transitive natives: JS fallbacks exist, builds not needed.
  "@coinbase/x402": false
  bufferutil: false
  esbuild: true
  keccak: false
  utf-8-validate: false
